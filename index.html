<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: white;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.header-title {
    font-size: 20px;
    font-weight: 700;
}

.version {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 2px 6px;
    border-radius: 6px;
}

.header-subtitle {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 4px;
}

.header-link a:link,
.header-link a:visited,
.header-link a:hover,
.header-link a:active {
    color: white;
    text-decoration: none;
}

/* WEEK CARD */
.week-card {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 18px;
    color: white;
}

.week-card table {
    background: white;
    color: black;
    width: 100%;
    border-collapse: collapse;
}

.week-summary {
    font-size: 16px;
    font-weight: bold;
    margin: 8px 0;
    cursor: pointer;
    padding: 8px;
    background: #f1f1f1;
    border-radius: 6px;
}

/* TABLE */
table, th, td {
    border: 1px solid #ccc;
}

th, td {
    padding: 4px;
    font-size: 12px;
    text-align: center;
}

/* CELLS */
.cell-box {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 45px;
}

.locked {
    background: #d4edda;
    padding: 6px;
    border-radius: 4px;
    position: relative;
}

.delete-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: red;
}

thead th {
    position: sticky;
    top: 0;
    background: #f7f7f7;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-title">
        Secret Laptop Booking System
        <span class="version">v4.61</span>
    </div>

    <div class="header-subtitle">
        Currently 15 devices in Rooms 13 & 18
    </div>

    <div class="header-link">
        Click <a href="https://eldersliehs.sentral.com.au/s-gdpOAz/resources/timetable" target="_blank">HERE</a> for Resource Booking
    </div>
</div>

<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

let bookings = [];
let weekSettings = [];

/* LOAD */
async function loadBookings() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        bookings = data.bookings.map(b => ({
            week: Number(b.week),
            day: b.day,
            period: Number(b.period),
            room: b.room,
            name: b.name
        }));

        weekSettings = data.weekSettings.map(w => ({
            week: Number(w.week),
            collapsed: String(w.collapsed).toLowerCase() === "true"
        }));

    } catch (err) {
        console.error(err);
    }
}

/* COLLAPSE STATE */
function isWeekCollapsed(week) {
    const setting = weekSettings.find(w => w.week == week);
    return setting ? setting.collapsed : false;
}

/* TOGGLE WEEK */
function toggleWeek(week, isOpen) {
    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            type: "weekToggle",
            week: String(week),
            collapsed: String(!isOpen)
        })
    });
}

/* BOOKING */
function confirmBooking(el, week, day, period, room) {
    const cell = el.closest(".cell-box");
    const name = cell.querySelector("input").value;

    if (!name) return alert("Enter name");

    cell.innerHTML = `
        <div class="locked">
            ${room}<br>${name}
            <button class="delete-btn"
                onclick="deleteBooking('${week}','${day}','${period}','${room}')">✕</button>
        </div>
    `;

    bookings.push({ week, day, period, room, name });

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({ week, day, period, room, name })
    });
}

/* CELL */
function createCell(week, day, period, room) {
    const booking = bookings.find(b =>
        b.week == week && b.day == day && b.period == period && b.room == room
    );

    if (booking) {
        return `
        <div class="locked">
            ${room}<br>${booking.name}
            <button class="delete-btn"
                onclick="deleteBooking('${week}','${day}','${period}','${room}')">✕</button>
        </div>`;
    }

    return `
        <div class="cell-box"
             onclick="startBooking(this, ${week}, '${day}', ${period}, '${room}')">
        </div>`;
}

/* EDIT MODE */
function startBooking(cell, week, day, period, room) {
    cell.innerHTML = `
        <input autofocus
            onkeydown="if(event.key==='Enter') confirmBooking(this, ${week}, '${day}', ${period}, '${room}')">
    `;
}

/* DELETE */
function deleteBooking(week, day, period, room) {

    bookings = bookings.filter(b =>
        !(b.week == week && b.day == day && b.period == period && b.room == room)
    );

    createTable();

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "delete",
            week, day, period, room
        })
    });
}

/* TABLE */
function createTable() {

    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    let html = "";

    for (let week = 1; week <= 11; week++) {

        const collapsed = isWeekCollapsed(week);

        html += `
<div class="week-card">
<details ${collapsed ? "" : "open"}
    onclick="setTimeout(() => toggleWeek(${week}, this.open), 0)">

<summary class="week-summary">Week ${week}</summary>

<table>
<thead>
<tr>
<th>Period</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
</tr>
</thead>
<tbody>
`;

        for (let p = 1; p <= 5; p++) {
            html += `<tr><th>${p}</th>`;

            for (let d of days) {
                html += `<td>
                    ${createCell(week,d,p,"Room 13")}
                    <hr>
                    ${createCell(week,d,p,"Room 18")}
                </td>`;
            }

            html += `</tr>`;
        }

        html += `
</tbody>
</table>
</details>
</div>`;
    }

    document.getElementById("app").innerHTML = html;
}

/* INIT */
async function init() {
    document.getElementById("app").innerHTML = "Loading...";
    await loadBookings();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
