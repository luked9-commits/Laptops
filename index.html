<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    h2 {
        margin-top: 30px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }

    th, td {
        border: 1px solid #333;
        padding: 8px;
        text-align: center;
        vertical-align: top;
    }

    th {
        background: #f0f0f0;
    }

    .cell-box {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    select, input, button {
        padding: 5px;
        width: 100%;
    }

    .locked {
        background: #d4edda;
        padding: 6px;
        border: 1px solid #333;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Term 2 Senior Laptop Booking</h1>

<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

function confirmBooking(btn) {
    console.log("CONFIRM CLICKED");

    const cell = btn.closest(".cell-box");
    const room = cell.querySelector("select").value;
    const name = cell.querySelector("input").value;

    if (!room || !name) {
        alert("Please select a room and enter your name.");
        return;
    }

    console.log("ABOUT TO SEND REQUEST");

    fetch(SCRIPT_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            room: room,
            name: name
        })
    })
    .then(res => res.text())
    .then(data => console.log("Saved:", data))
    .catch(err => console.error("Error:", err));

    cell.innerHTML = `
        <div class="locked">
            ${room}<br>
            ${name}
        </div>
    `;
}

function createCell() {
    return `
        <div class="cell-box">
            <select>
                <option value="">Select Room</option>
                <option>Room 13</option>
                <option>Room 18</option>
            </select>
            <input type="text" placeholder="Your name">
            <button onclick="confirmBooking(this)">Confirm</button>
        </div>
    `;
}

function createTable() {
    let html = "";

    for (let week = 1; week <= 11; week++) {
        html += `<h2>Week ${week}</h2>`;
        html += `
        <table>
            <tr>
                <th>Period</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        `;

        for (let p = 1; p <= 5; p++) {
            html += `
            <tr>
                <th>${p}</th>
                <td>${createCell()}</td>
                <td>${createCell()}</td>
                <td>${createCell()}</td>
                <td>${createCell()}</td>
                <td>${createCell()}</td>
            </tr>
            `;
        }

        html += `</table>`;
    }

    document.getElementById("app").innerHTML = html;
}

createTable();
</script>

</body>
</html>
