<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
    font-size: 12px;
}

th {
    background: #f7f7f7;
}

.locked {
    position: relative;
    background: #d4edda;
    padding: 6px;
    border-radius: 4px;
    font-size: 11px;
}

.delete-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: transparent;
    border: none;
    color: #e74c3c;
    cursor: pointer;
    opacity: 0;
}

.locked:hover .delete-btn {
    opacity: 1;
}

.cell-box {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
}

.week-summary {
    font-weight: bold;
    cursor: pointer;
    padding: 8px;
    background: #f1f1f1;
    margin: 10px 0;
}

</style>
</head>

<body>

<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

let bookings = [];
let weekSettings = [];

/* ---------------- LOAD ---------------- */
async function loadBookings() {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    bookings = data.bookings.map(b => ({
        week: Number(b.week),
        day: b.day,
        period: Number(b.period),
        room: b.room,
        name: b.name,
        quantity: Number(b.quantity || 15)
    }));

    weekSettings = data.weekSettings || [];
}

/* ---------------- WEEK STATE ---------------- */
function isWeekCollapsed(week) {
    const w = weekSettings.find(x => x.week == week);
    return w ? w.collapsed : false;
}

/* ---------------- BOOKING ---------------- */
function confirmBooking(el, week, day, period, room) {
    const cell = el.closest(".cell-box");

    const name = cell.querySelector("input").value;
    const qty = cell.querySelector("select").value;

    if (!name || !qty) {
        alert("Enter name and select quantity");
        return;
    }

    // UI update
    cell.outerHTML = `
        <div class="locked">
            ${room}<br>
            ${name}<br>
            ${qty} devices
            <button class="delete-btn"
                onclick="deleteBooking('${week}','${day}','${period}','${room}')">✕</button>
        </div>
    `;

    // local state
    bookings.push({
        week: Number(week),
        day,
        period: Number(period),
        room,
        name,
        quantity: Number(qty)
    });

    // backend
    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            week,
            day,
            period,
            room,
            name,
            quantity: qty
        })
    });
}

/* ---------------- CELL ---------------- */
function createCell(week, day, period, room) {

    const b = bookings.find(x =>
        x.week == week &&
        x.day == day &&
        x.period == period &&
        x.room == room
    );

    if (b) {
        return `
            <div class="locked">
                ${room}<br>
                ${b.name}<br>
                ${b.quantity || 15} devices
                <button class="delete-btn"
                    onclick="deleteBooking('${week}','${day}','${period}','${room}')">✕</button>
            </div>
        `;
    }

    return `
        <div class="cell-box">
            <input type="text" placeholder="Name">

            <select>
                ${Array.from({length: 15}, (_, i) => {
                    const v = i + 1;
                    return `<option value="${v}">${v} devices</option>`;
                }).join("")}
            </select>

            <button onclick="confirmBooking(this, ${week}, '${day}', ${period}, '${room}')">
                Book
            </button>
        </div>
    `;
}

/* ---------------- DELETE ---------------- */
function deleteBooking(week, day, period, room) {

    bookings = bookings.filter(b =>
        !(b.week == week && b.day == day && b.period == period && b.room == room)
    );

    createTable();

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "delete",
            week,
            day,
            period,
            room
        })
    });
}

/* ---------------- TABLE ---------------- */
function createTable() {

    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

    let html = "";

    for (let week = 1; week <= 11; week++) {

        html += `
<details ${isWeekCollapsed(week) ? "" : "open"}>
<summary class="week-summary">Week ${week}</summary>

<table>
<thead>
<tr>
<th>Period</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th>
</tr>
</thead>
<tbody>
`;

        for (let period = 1; period <= 5; period++) {
            html += `<tr><th>${period}</th>`;

            for (let day of days) {
                html += `
                    <td>
                        ${createCell(week, day, period, "Room 13")}
                        <hr>
                        ${createCell(week, day, period, "Room 18")}
                    </td>
                `;
            }

            html += `</tr>`;
        }

        html += `</tbody></table></details>`;
    }

    document.getElementById("app").innerHTML = html;
}

/* ---------------- INIT ---------------- */
async function init() {
    document.getElementById("app").innerHTML = "Loading...";
    await loadBookings();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
