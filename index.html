<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1 { margin-bottom: 20px; }
    h2 { margin-top: 30px; }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }

    th, td {
        border: 1px solid #333;
        padding: 8px;
        text-align: center;
        vertical-align: top;
    }

    th {
        background: #f0f0f0;
    }

    .cell-box {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    select, input, button {
        padding: 5px;
        width: 100%;
    }

    .locked {
        background: #d4edda;
        padding: 6px;
        border: 1px solid #333;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Term 2 Senior Laptop Booking</h1>

<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

let bookings = [];

/* ---------------------------
   LOAD BOOKINGS FROM SHEETS
----------------------------*/
async function loadBookings() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        bookings = data || [];

        console.log("Loaded bookings:", bookings);
    } catch (err) {
        console.error("Load error:", err);
        bookings = [];
    }
}

/* ---------------------------
   SAVE BOOKING
----------------------------*/
function confirmBooking(btn) {
    const cell = btn.closest(".cell-box");
    const room = cell.querySelector("select").value;
    const name = cell.querySelector("input").value;

    if (!room || !name) {
        alert("Please select a room and enter your name.");
        return;
    }

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            room: room,
            name: name
        })
    })
    .then(() => console.log("Saved to Sheets"))
    .catch(err => console.error("Error:", err));

    cell.innerHTML = `
        <div class="locked">
            ${room}<br>
            ${name}
        </div>
    `;
}

/* ---------------------------
   RENDER CELL
----------------------------*/
function isBooked(room) {
    return bookings.some(b => b.room === room);
}

function getName(room) {
    const found = bookings.find(b => b.room === room);
    return found ? found.name : "";
}

function createCell(roomKey) {
    if (isBooked(roomKey)) {
        return `
            <div class="locked">
                ${roomKey}<br>
                ${getName(roomKey)}
            </div>
        `;
    }

    return `
        <div class="cell-box">
            <select>
                <option value="">Select Room</option>
                <option>Room 13</option>
                <option>Room 18</option>
            </select>
            <input type="text" placeholder="Your name">
            <button onclick="confirmBooking(this)">Confirm</button>
        </div>
    `;
}

/* ---------------------------
   BUILD TABLE
----------------------------*/
function createTable() {
    let html = "";

    for (let week = 1; week <= 11; week++) {
        html += `<h2>Week ${week}</h2>`;

        html += `<table>
            <tr>
                <th>Period</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
            </tr>`;

        for (let p = 1; p <= 5; p++) {
            html += `<tr>
                <th>${p}</th>
                <td>${createCell("Room 13")}</td>
                <td>${createCell("Room 18")}</td>
                <td>${createCell("Room 13")}</td>
                <td>${createCell("Room 18")}</td>
                <td>${createCell("Room 13")}</td>
            </tr>`;
        }

        html += `</table>`;
    }

    document.getElementById("app").innerHTML = html;
}

/* ---------------------------
   INIT (IMPORTANT)
----------------------------*/
async function init() {
    await loadBookings();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
