<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1 {
    font-size: 20px;
    margin-bottom: 10px;
}

h2 {
    font-size: 16px;
    margin-top: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
    vertical-align: top;
    font-size: 12px;
}

th {
    background: #f7f7f7;
    font-weight: 600;
}

.cell-box {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

select, input {
    padding: 3px;
    font-size: 11px;
}

button {
    padding: 3px;
    font-size: 11px;
}

.locked {
    position: relative;
    background: #d4edda;
    padding: 4px;
    border-radius: 4px;
    border: 1px solid #b5d6b5;
    font-size: 11px;
    line-height: 1.2;
}
    .delete-btn {
    position: absolute;
    top: 2px;
    right: 2px;

    background: transparent;
    border: none;
    color: #e74c3c;

    font-size: 11px;
    cursor: pointer;

    opacity: 0;
    transition: 0.15s ease;
}

.locked:hover .delete-btn {
    opacity: 1;
}

.delete-btn:hover {
    color: #c0392b;
}
    
</style>
</head>

<body>

<h1>Secret Laptop Booking System v3.1</h1>

<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

let bookings = [];

/* -------------------------
   LOAD BOOKINGS
------------------------- */
async function loadBookings() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        bookings = data.map(b => ({
            week: Number(b.week),
            day: b.day,
            period: Number(b.period),
            room: b.room,
            name: b.name
        }));

    } catch (err) {
        console.error("Load failed:", err);
        bookings = [];
    }
}
function isBooked(week, day, period, room) {
    return bookings.some(b =>
        b.week === week &&
        b.day === day &&
        b.period === period &&
        b.room === room
    );
}
/* -------------------------
   CHECK BOOKINGS
------------------------- */
function isBooked(week, day, period, room) {
    return bookings.some(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );
}

function getBooking(week, day, period, room) {
    return bookings.find(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );
}

/* -------------------------
   SEND BOOKING
------------------------- */
function confirmBooking(btn, week, day, period, room) {
    const cell = btn.closest(".cell-box");
    const name = cell.querySelector("input").value;

    if (!name) {
        alert("Enter name");
        return;
    }

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            week,
            day,
            period,
            room,
            name
        })
    });

    cell.innerHTML = `
        <div class="locked">
            ${room}<br>${name}
        </div>
    `;
}

/* -------------------------
   CELL
------------------------- */
function createCell(week, day, period, room) {

    const booking = bookings.find(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );

    if (booking) {
    return `
        <div class="locked">
            ${room}<br>
            ${booking.name}
            <br>
            <button class="delete-btn"
    onclick="deleteBooking('${week}','${day}','${period}','${room}')">
    ✕
</button>
        </div>
    `;
}

    return `
        <div class="cell-box">
            <input type="text" placeholder="Your name">
            <button onclick="confirmBooking(this, ${week}, '${day}', ${period}, '${room}')">
                Confirm ${room}
            </button>
        </div>
    `;
}

/* -------------------------
   TABLE
------------------------- */
function createTable() {
    let html = "";

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

    for (let week = 1; week <= 11; week++) {
        html += `<h2>Week ${week}</h2>`;

        html += `<table>
            <tr>
                <th>Period</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
            </tr>`;

        for (let period = 1; period <= 5; period++) {
    html += `<tr>
        <th>${period}</th>`;

    for (let d = 0; d < days.length; d++) {
        const day = days[d];

        html += `
            <td>
                ${createCell(week, day, period, "Room 13")}
                <hr>
                ${createCell(week, day, period, "Room 18")}
            </td>
        `;
    }

    html += `</tr>`;
}

        html += `</table>`;
    }

    document.getElementById("app").innerHTML = html;
}
/* -------------------------
   Delete booking
------------------------- */
    function deleteBooking(week, day, period, room) {

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "delete",
            week,
            day,
            period,
            room
        })
    })
    .then(() => {
        console.log("Deleted");

        // remove from local state
        bookings = bookings.filter(b =>
            !(b.week == week &&
              b.day == day &&
              b.period == period &&
              b.room == room)
        );

        createTable();
    })
    .catch(err => console.error("Delete failed:", err));
}
/* -------------------------
   INIT
------------------------- */
async function init() {
    await loadBookings();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
