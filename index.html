<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    .cell-box {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 8px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
    }

    select, input, button {
        padding: 5px;
    }

    .locked {
        padding: 6px;
        background: #d4edda;
        border: 1px solid #333;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Term 2 Senior Laptop Booking</h1>

<div class="cell-box">
    <select>
        <option value="">Select Room</option>
        <option>Room 13</option>
        <option>Room 18</option>
    </select>

    <input type="text" placeholder="Your name">

    <button onclick="confirmBooking(this)">Confirm</button>
</div>

<script>
function confirmBooking(btn) {
    const cell = btn.closest(".cell-box");
    const room = cell.querySelector("select").value;
    const name = cell.querySelector("input").value;

    if (!room || !name) {
        alert("Please select a room and enter your name.");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbwNJJFYxFTf7Q_s0Ffvk-QUE5p7mda6SQw8HXyt6CsYRfo1GdxYuLI6XQC6ZMUCB6uv/exec", {
        method: "POST",
        mode: "no-cors",
        body: new URLSearchParams({
            room: room,
            name: name
        })
    });

    cell.innerHTML = `
        <div class="locked">
            ${room}<br>
            ${name}
        </div>
    `;
}
</script>

</body>
</html>
