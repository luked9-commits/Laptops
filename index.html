<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

/* =========================
   HEADER
========================= */
.header {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: white;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.header-title {
    font-size: 20px;
    font-weight: 700;
}

.version {
    font-size: 12px;
    opacity: 0.8;
    margin-left: 8px;
}

.header-subtitle {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 4px;
}

/* =========================
   TABLE
========================= */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    border: 1px solid #ddd;
    padding: 3px;
    text-align: center;
    font-size: 11px;
}

th {
    background: #f7f7f7;
}

.day-cell {
    vertical-align: top;
}
.locked {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 4px 6px;
    background: #d4edda;
    border-radius: 4px;

    font-size: 10px;
    white-space: nowrap;

    position: relative;
}
/* =========================
   BOOKING ROW (INPUT STATE)
========================= */
.room-row {
    display: inline-grid;
    grid-template-columns: 60px 1fr auto;
    gap: 4px;
    padding: 4px;
    margin-bottom: 4px;

    font-size: 10px;
    border: 1px solid #eee;
    border-radius: 4px;

    max-width: 220px;
    align-items: center;
}

.room-row input,
.room-row select {
    width: 100%;
    font-size: 10px;
    box-sizing: border-box;
    min-width: 0;
}

.controls {
    display: flex;
    gap: 3px;
    align-items: center;
}

/* confirm button */
.controls button {
    width: 40px;
    flex-shrink: 0;
    font-weight: bold;
}

/* =========================
   CONFIRMED BOOKING STATE
========================= */
.locked {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 4px 6px;
    background: #d4edda;
    border-radius: 4px;

    font-size: 10px;
    white-space: nowrap;
}

/* delete button */
.delete-btn {
    position: absolute;
    top: 2px;
    right: 4px;

    border: none;
    background: transparent;
    color: red;
    cursor: pointer;
    opacity: 0;
}

.locked:hover .delete-btn {
    opacity: 1;
}

/* =========================
   WEEK UI
========================= */
.week-summary {
    background: #f1f1f1;
    padding: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}

/* =========================
   FORM ELEMENTS (GLOBAL)
========================= */
select, input {
    font-size: 11px;
    padding: 2px;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-title">
        Secret Laptop Booking System
        <span class="version">v5.14</span>
    </div>

    <div class="header-subtitle">
        Currently 15 devices each in rooms 18 and 13, and 32~ in room 12
    </div>

    <div class="header-link">
    Click <a href="https://eldersliehs.sentral.com.au/s-gdpOAz/resources/timetable" target="_blank">HERE</a> for Sentral Resource Booking
</div>
</div>
    
    <div id="userBar" style="margin-bottom:10px;">
    <input id="userInput" placeholder="Enter your name">
    <button onclick="setUser()">Set User</button>

    <span id="currentUserDisplay" style="margin-left:10px;"></span>
</div>

<div id="app">Loading...</div>

<script>
    
    let currentUser = localStorage.getItem("laptopUser") || "";
    
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

let bookings = [];
let weekSettings = [];

/* ---------------- LOAD ---------------- */
async function loadBookings() {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    bookings = data.bookings.map(b => ({
        week: Number(b.week),
        day: b.day,
        period: Number(b.period),
        room: b.room,
        name: b.name,
        quantity: Number(b.quantity || 15)
    }));

    weekSettings = data.weekSettings || [];
}

/* ---------------- CONFIRM ---------------- */

function confirmBooking(btn, week, day, period, room) {

    if (!currentUser) {
        alert("Please set your user first");
        return;
    }

    const cell = btn.closest(".room-row");

    const name = currentUser;
    const qty = cell.querySelector("select").value;

    if (cell.dataset.confirmed === "true") return;
    cell.dataset.confirmed = "true";

    // update local state first
bookings.push({
    week: Number(week),
    day,
    period: Number(period),
    room,
    name,
    quantity: Number(qty)
});

// re-render table so UI matches backend version
createTable();

    bookings.push({
        week: Number(week),
        day,
        period: Number(period),
        room,
        name,
        quantity: Number(qty)
    });

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            week,
            day,
            period,
            room,
            name,
            quantity: qty
        })
    });
}  

/* ---------------- CELL ---------------- */
function createCell(week, day, period, room) {

    const b = bookings.find(x =>
        x.week == week &&
        x.day == day &&
        x.period == period &&
        x.room == room
    );

    if (b) {
       return `
    <div class="room-row locked">
                ${room}<br>
                ${b.name}<br>
                ${b.quantity || 15} devices
                <button class="delete-btn"
                    onclick="deleteBooking('${week}','${day}','${period}','${room}')">✕</button>
            </div>
        `;
    }

    // EMPTY CELL

// EMPTY CELL

const maxDevices = room === "Room 12" ? 32 : 15;

return `
<div class="room-row">

    <span>${room}</span>

    <div class="controls">

        <select>
            ${Array.from({length: room === "Room 12" ? 32 : 15}, (_, i) => {
                const v = (room === "Room 12" ? 32 : 15) - i;
                return `<option value="${v}">${v}</option>`;
            }).join("")}
        </select>

        <button onclick="confirmBooking(this, ${week}, '${day}', ${period}, '${room}')">
            ✓
        </button>

    </div>

</div>
`;
}


/* ---------------- WEEK SETTINGS ---------------- */
function isWeekCollapsed(week) {
    if (!weekSettings || !Array.isArray(weekSettings)) return false;

    const setting = weekSettings.find(w => w.week == week);
    return setting ? setting.collapsed : false;
}


/* ---------------- TOGGLE WEEK ---------------- */
function toggleWeek(week, isOpen) {
    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            type: "weekToggle",
            week: String(week),
            collapsed: String(!isOpen)
        })
    }).catch(err => console.error(err));
}


/* ---------------- DELETE ---------------- */
function deleteBooking(week, day, period, room) {

    bookings = bookings.filter(b =>
        !(b.week == week && b.day == day && b.period == period && b.room == room)
    );

    createTable();

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "delete",
            week,
            day,
            period,
            room
        })
    });
}

/* ---------------- CREATE USER ---------------- */
    function setUser() {
    const name = document.getElementById("userInput").value;

    if (!name) return;

    currentUser = name;

    localStorage.setItem("laptopUser", name);

    updateUserDisplay();
}

function updateUserDisplay() {
    const display = document.getElementById("currentUserDisplay");
    if (!display) return;

    display.textContent = currentUser
        ? "Logged in as: " + currentUser
        : "No user set";
}
/* ---------------- TABLE ---------------- */
function createTable() {

    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

    let html = "";

    for (let week = 1; week <= 11; week++) {

        const collapsed = isWeekCollapsed(week);

        html += `
<details ${collapsed ? "" : "open"} 
    onclick="setTimeout(() => toggleWeek(${week}, this.open), 0)">
<summary class="week-summary">Week ${week}</summary>

<table>
<thead>
<tr>
<th>Period</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th>
</tr>
</thead>
<tbody>
`;

        for (let period = 1; period <= 5; period++) {
            html += `<tr><th>${period}</th>`;

            for (let day of days) {
                html += `
                    <td class="day-cell">
    ${createCell(week, day, period, "Room 13")}
${createCell(week, day, period, "Room 18")}
${createCell(week, day, period, "Room 12")}
</td>
                `;
            }

            html += `</tr>`;
        }

        html += `</tbody></table></details>`;
    }

    document.getElementById("app").innerHTML = html;
}

/* ---------------- INIT ---------------- */
async function init() {
    await loadBookings();
    updateUserDisplay();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
