<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1 {
    font-size: 20px;
    margin-bottom: 10px;
}

h2 {
    font-size: 16px;
    margin-top: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
    vertical-align: top;
    font-size: 12px;
}

th {
    background: #f7f7f7;
    font-weight: 600;
}


select, input {
    padding: 3px;
    font-size: 11px;
}

button {
    padding: 3px;
    font-size: 11px;
}

.locked {
    position: relative;
    background: #d4edda;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #b5d6b5;
    font-size: 11px;
    line-height: 1.2;

    width: 100%;
    box-sizing: border-box;
}
    
    .delete-btn {
    position: absolute;
    top: 2px;
    right: 2px;

    background: transparent;
    border: none;
    color: #e74c3c;

    font-size: 11px;
    cursor: pointer;

    opacity: 0;
    transition: 0.15s ease;
}

.locked:hover .delete-btn {
    opacity: 1;
}

.delete-btn:hover {
    color: #c0392b;
}
    .placeholder {
    font-size: 16px;
    color: #bbb;
    cursor: pointer;
}

.cell-box {
    display: flex;
    align-items: stretch;
    justify-content: center;
    min-height: 45px;

}

.cell-box:hover {
    background: #f5f5f5;
}

thead th {
    position: sticky;
    top: 0;
    background: #f7f7f7;
    z-index: 10;
}
    
</style>
</head>

<body>

<h1>Secret Laptop Booking System v3.1</h1>

<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldON0MFK4Q2jWhRFsubAFQNBdQhx43kThazkpdjGV4tQDI7vz6yBNok9YRNvUOVr3/exec";

let bookings = [];

/* -------------------------
   LOAD BOOKINGS
------------------------- */
async function loadBookings() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        bookings = data.map(b => ({
            week: Number(b.week),
            day: b.day,
            period: Number(b.period),
            room: b.room,
            name: b.name
        }));

    } catch (err) {
        console.error("Load failed:", err);
        bookings = [];
    }
}

/* -------------------------
   CHECK BOOKINGS
------------------------- */
function isBooked(week, day, period, room) {
    return bookings.some(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );
}

function getBooking(week, day, period, room) {
    return bookings.find(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );
}

/* -------------------------
   SEND BOOKING
------------------------- */

    function confirmBooking(btn, week, day, period, room) {
    const cell = btn.closest(".cell-box");
    const name = cell.querySelector("input").value;

    if (!name) {
        alert("Enter name");
        return;
    }

    // ⚡ 1. INSTANT UI UPDATE
    cell.innerHTML = `
        <div class="locked">
            ${room}<br>
            ${name}
            <button class="delete-btn"
                onclick="deleteBooking('${week}','${day}','${period}','${room}')">
                ✕
            </button>
        </div>
    `;

    // 🧠 2. UPDATE LOCAL STATE (THIS IS WHAT YOU ARE MISSING)
    bookings.push({
        week: Number(week),
        day,
        period: Number(period),
        room,
        name
    });

    // 🔄 3. SEND TO SHEETS IN BACKGROUND
    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            week,
            day,
            period,
            room,
            name
        })
    }).catch(err => console.error("Save failed:", err));
}


/* -------------------------
   CELL
------------------------- */
function createCell(week, day, period, room) {

    const booking = bookings.find(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );

    // ✅ BOOKED CELL
    if (booking) {
        return `
            <div class="locked">
                ${room}<br>
                ${booking.name}
                <button class="delete-btn"
                    onclick="deleteBooking('${week}','${day}','${period}','${room}')">
                    ✕
                </button>
            </div>
        `;
    }

    // ✅ EMPTY CELL (THIS IS THE NEW PART)
    
    return `
        <div class="cell-box">
            <input type="text" placeholder="Your name">
            <button onclick="confirmBooking(this, ${week}, '${day}', ${period}, '${room}')">
                Confirm ${room}
            </button>
        </div>
    `;
}
    
function startBooking(cell, week, day, period, room) {
    cell.innerHTML = `
        <input type="text" placeholder="Name" style="font-size:11px;padding:3px;">
        <button onclick="confirmBooking(this, ${week}, '${day}', ${period}, '${room}')">
            ✓
        </button>
    `;
}
/* -------------------------
   TABLE
------------------------- */
function createTable() {
    let html = "";

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

    for (let week = 1; week <= 11; week++) {
        html += `<h2>Week ${week}</h2>`;

        html += `
        <table>
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Mon</th>
                    <th>Tue</th>
                    <th>Wed</th>
                    <th>Thu</th>
                    <th>Fri</th>
                </tr>
            </thead>
            <tbody>
        `;

        for (let period = 1; period <= 5; period++) {
            html += `<tr>
                <th>${period}</th>`;

            for (let d = 0; d < days.length; d++) {
                const day = days[d];

                html += `
                    <td>
                        ${createCell(week, day, period, "Room 13")}
                        <hr>
                        ${createCell(week, day, period, "Room 18")}
                    </td>
                `;
            }

            html += `</tr>`;
        }

        html += `
            </tbody>
        </table>`;
    }

    document.getElementById("app").innerHTML = html;
}
/* -------------------------
   Delete booking
------------------------- */
    function deleteBooking(week, day, period, room) {

    // ✅ 1. INSTANT UI UPDATE
    bookings = bookings.filter(b =>
    !(
        Number(b.week) === Number(week) &&
        String(b.day) === String(day) &&
        Number(b.period) === Number(period) &&
        String(b.room) === String(room)
    )
);

    createTable();

    // ✅ 2. BACKGROUND SYNC
    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "delete",
            week,
            day,
            period,
            room
        })
    }).catch(err => console.error("Delete failed:", err));
}
/* -------------------------
   INIT
------------------------- */
async function init() {
    await loadBookings();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
