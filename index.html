<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1 { margin-bottom: 20px; }
h2 { margin-top: 30px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}

th, td {
    border: 1px solid #333;
    padding: 8px;
    text-align: center;
    vertical-align: top;
}

th {
    background: #f0f0f0;
}

.cell-box {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

select, input, button {
    padding: 5px;
    width: 100%;
}

.locked {
    background: #d4edda;
    padding: 6px;
    border: 1px solid #333;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Term 2 Senior Laptop Booking</h1>

<div id="app"></div>

<script>
const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE";

let bookings = [];

/* -------------------------
   LOAD BOOKINGS
------------------------- */
async function loadBookings() {
    const res = await fetch(SCRIPT_URL);
    bookings = await res.json();
}

/* -------------------------
   CHECK IF BOOKED
------------------------- */
function isBooked(week, day, period, room) {
    return bookings.some(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );
}

function getBooking(week, day, period, room) {
    return bookings.find(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );
}

/* -------------------------
   SEND BOOKING
------------------------- */
function confirmBooking(btn, week, day, period) {
    const cell = btn.closest(".cell-box");
    const room = cell.querySelector("select").value;
    const name = cell.querySelector("input").value;

    if (!room || !name) {
        alert("Please select a room and enter your name.");
        return;
    }

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            week,
            day,
            period,
            room,
            name
        })
    });

    cell.innerHTML = `
        <div class="locked">
            ${room}<br>${name}
        </div>
    `;
}

/* -------------------------
   CELL RENDER
------------------------- */
function createCell(week, day, period, room) {

    if (isBooked(week, day, period, room)) {
        const b = getBooking(week, day, period, room);
        return `
            <div class="locked">
                ${room}<br>${b.name}
            </div>
        `;
    }

    return `
        <div class="cell-box">
            <select>
                <option value="">Select Room</option>
                <option>Room 13</option>
                <option>Room 18</option>
            </select>
            <input type="text" placeholder="Your name">
            <button onclick="confirmBooking(this, ${week}, '${day}', ${period})">Confirm</button>
        </div>
    `;
}

/* -------------------------
   TABLE BUILDER
------------------------- */
function createTable() {
    let html = "";

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

    for (let week = 1; week <= 11; week++) {
        html += `<h2>Week ${week}</h2>`;

        html += `<table>
            <tr>
                <th>Period</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
            </tr>`;

        for (let period = 1; period <= 5; period++) {
            html += `<tr>
                <th>${period}</th>`;

            for (let d = 0; d < days.length; d++) {
                const day = days[d];
                const room = (period % 2 === 0) ? "Room 18" : "Room 13";

                html += `<td>${createCell(week, day, period, room)}</td>`;
            }

            html += `</tr>`;
        }

        html += `</table>`;
    }

    document.getElementById("app").innerHTML = html;
}

/* -------------------------
   INIT
------------------------- */
async function init() {
    await loadBookings();
    createTable();
}

window.onload = init;
</script>

</body>
</html>
