<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Senior Laptop Booking</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
    vertical-align: top;
    font-size: 12px;
}

th {
    background: #f7f7f7;
    font-weight: 600;
}

thead th {
    position: sticky;
    top: 0;
    background: #f7f7f7;
    z-index: 10;
}

input, select {
    padding: 3px;
    font-size: 11px;
    width: 100%;
    box-sizing: border-box;
}

.cell-box {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 55px;
}

.locked {
    position: relative;
    background: #d4edda;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #b5d6b5;
    font-size: 11px;
    line-height: 1.3;
    width: 100%;
    box-sizing: border-box;
}

.delete-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: transparent;
    border: none;
    color: #e74c3c;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: 0.15s ease;
}

.locked:hover .delete-btn {
    opacity: 1;
}

.delete-btn:hover {
    color: #c0392b;
}

.week-summary {
    font-size: 16px;
    font-weight: bold;
    margin: 12px 0;
    cursor: pointer;
    padding: 8px;
    background: #f1f1f1;
    border-radius: 6px;
}

.week-summary:hover {
    background: #e7e7e7;
}

details {
    margin-bottom: 15px;
}

.header {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: white;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.header-title {
    font-size: 20px;
    font-weight: 700;
}

.version {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 2px 6px;
    border-radius: 6px;
    margin-left: 8px;
}

.header-subtitle {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 4px;
}

.header-link a {
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-title">
        Secret Laptop Booking System
        <span class="version">v4.61</span>
    </div>

    <div class="header-subtitle">
        Currently 15 devices each in rooms 18 and 13.
    </div>

    <div class="header-link">
        Click <a href="https://eldersliehs.sentral.com.au/s-gdpOAz/resources/timetable" target="_blank">HERE</a> for Sentral Resource Booking
    </div>
</div>

<div id="app"></div>

<script>

const SCRIPT_URL = "YOUR_WEB_APP_URL";

let bookings = [];
let weekSettings = [];

/* -------------------------
   LOAD BOOKINGS
------------------------- */
async function loadBookings() {

    try {

        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        bookings = data.bookings.map(b => ({
            week: Number(b.week),
            day: b.day,
            period: Number(b.period),
            room: b.room,
            name: b.name,
            quantity: Number(b.quantity || 15)
        }));

        weekSettings = data.weekSettings.map(w => ({
            week: Number(w.week),
            collapsed: String(w.collapsed).toLowerCase() === "true"
        }));

    } catch (err) {

        console.error(err);

        bookings = [];
        weekSettings = [];
    }
}

/* -------------------------
   WEEK COLLAPSE
------------------------- */
function isWeekCollapsed(week) {

    const setting = weekSettings.find(w => w.week == week);

    return setting ? setting.collapsed : false;
}

function toggleWeek(week, isOpen) {

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            type: "weekToggle",
            week,
            collapsed: String(!isOpen)
        })
    });
}

/* -------------------------
   CONFIRM BOOKING
------------------------- */
function confirmBooking(dropdown, week, day, period, room) {

    const cell = dropdown.closest(".cell-box");

    const name = cell.querySelector("input").value.trim();
    const quantity = dropdown.value;

    if (!name || !quantity) {
        alert("Enter name");
        return;
    }

    // instant UI
    cell.outerHTML = `
        <div class="locked">
            ${room}<br>
            ${name}<br>
            ${quantity} devices

            <button class="delete-btn"
                onclick="deleteBooking('${week}','${day}','${period}','${room}')">
                ✕
            </button>
        </div>
    `;

    // local state
    bookings.push({
        week: Number(week),
        day,
        period: Number(period),
        room,
        name,
        quantity: Number(quantity)
    });

    // backend sync
    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            week,
            day,
            period,
            room,
            name,
            quantity
        })
    }).catch(err => console.error(err));
}

/* -------------------------
   DELETE BOOKING
------------------------- */
function deleteBooking(week, day, period, room) {

    bookings = bookings.filter(b =>
        !(
            Number(b.week) === Number(week) &&
            String(b.day) === String(day) &&
            Number(b.period) === Number(period) &&
            String(b.room) === String(room)
        )
    );

    createTable();

    fetch(SCRIPT_URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "delete",
            week,
            day,
            period,
            room
        })
    }).catch(err => console.error(err));
}

/* -------------------------
   CELL
------------------------- */
function createCell(week, day, period, room) {

    const booking = bookings.find(b =>
        b.week == week &&
        b.day == day &&
        b.period == period &&
        b.room == room
    );

    // booked
    if (booking) {

        return `
            <div class="locked">
                ${room}<br>
                ${booking.name}<br>
                ${booking.quantity} devices

                <button class="delete-btn"
                    onclick="deleteBooking('${week}','${day}','${period}','${room}')">
                    ✕
                </button>
            </div>
        `;
    }

    // empty
    return `
        <div class="cell-box">

            <input type="text" placeholder="Your name">

            <select
                onchange="confirmBooking(this, ${week}, '${day}', ${period}, '${room}')"
            >

                <option value="">Book ${room}</option>

                ${Array.from({length: 15}, (_, i) => {

                    const val = i + 1;

                    return `
                        <option value="${val}" ${val === 15 ? "selected" : ""}>
                            ${val} devices
                        </option>
                    `;

                }).join("")}

            </select>

        </div>
    `;
}

/* -------------------------
   TABLE
------------------------- */
function createTable() {

    let html = "";

    const days = [
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday"
    ];

    for (let week = 1; week <= 11; week++) {

        const collapsed = isWeekCollapsed(week);

        html += `
<details
    ${collapsed ? "" : "open"}
    onclick="setTimeout(() => toggleWeek(${week}, this.open), 0)"
>

<summary class="week-summary">
    Week ${week}
</summary>

<table>

<thead>
<tr>
    <th>Period</th>
    <th>Mon</th>
    <th>Tue</th>
    <th>Wed</th>
    <th>Thu</th>
    <th>Fri</th>
</tr>
</thead>

<tbody>
`;

        for (let period = 1; period <= 5; period++) {

            html += `<tr><th>${period}</th>`;

            for (let d = 0; d < days.length; d++) {

                const day = days[d];

                html += `
<td>
    ${createCell(week, day, period, "Room 13")}
    <hr>
    ${createCell(week, day, period, "Room 18")}
</td>
`;
            }

            html += `</tr>`;
        }

        html += `
</tbody>
</table>
</details>
`;
    }

    document.getElementById("app").innerHTML = html;
}

/* -------------------------
   INIT
------------------------- */
async function init() {

    document.getElementById("app").innerHTML = "Loading...";

    await loadBookings();

    createTable();
}

window.onload = init;

</script>

</body>
</html>
